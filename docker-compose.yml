services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "${API_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
    - "${DB_PORT}:5432"
    volumes:
    - ./out/pgdata:/var/lib/postgresql/data

    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U ${DB_USER} -d ${DB_NAME}"
      ]
      interval: 5s
      timeout: 5s
      retries: 5

    restart: always

  fleettrack-postgres-migrate:
    image: migrate/migrate:v4.19.1
    working_dir: /
    volumes:
      - ./migrations:/migrations

volumes:
  postgres_data: